<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Report_FINAL | Dhanmondi SC Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --neon-cyan: #00f2ff;
            --neon-orange: #ff8c00;
            --dark-bg: #0a0a0a;
            --card-bg: #141414;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--dark-bg);
            color: #e0e0e0;
        }

        /* Responsive Table Wrapper */
        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .report-paper { 
            width: 297mm; 
            min-height: 210mm; 
            padding: 10mm; 
            background: var(--card-bg); 
            margin: auto; 
            color: #fff; 
            position: relative;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        table { width: 100%; border-collapse: collapse; border: 1.5px solid #333; table-layout: fixed; }
        th { 
            background: #1f1f1f; 
            color: var(--neon-cyan); 
            border: 1px solid #333; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            font-size: 11px;
        }
        td { border: 1px solid #333; padding: 2px; text-align: center; font-size: 10px; height: 32px; vertical-align: middle; }

        /* Glowing Inputs */
        .header-input { 
            border: none; outline: none; font-weight: bold; font-size: 11px; 
            background: transparent; border-bottom: 1px solid #444; 
            color: var(--neon-cyan);
            transition: border-color 0.3s;
        }
        .header-input:focus { border-bottom-color: var(--neon-orange); }

        .table-input { 
            border: none; outline: none; width: 100%; text-align: center; 
            font-size: 11px; background: transparent; height: 100%; 
            color: #fff;
        }
        .table-input:focus { background: rgba(0, 242, 255, 0.05); }

        .sc-title { 
            font-size: 42px; font-weight: 900; margin: 0; 
            color: var(--neon-orange); 
            letter-spacing: 5px; text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 140, 0, 0.3);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }

        @media print { 
            .no-print { display: none !important; } 
            body { background: white !important; color: black !important; } 
            .report-paper { background: white !important; color: black !important; border: none; width: 100%; box-shadow: none; }
            th { background: #eee !important; color: black !important; border: 1px solid black !important; }
            td { border: 1px solid black !important; color: black !important; }
            .sc-title { color: black !important; text-shadow: none; }
            .header-input { color: black !important; border-bottom: 1px solid black; }
            #printContainer { display: block !important; }
            @page { size: landscape; margin: 0; }
        }

        #printContainer { display: none; }
        
        /* Mobile adjustment for the main report area */
        @media (max-width: 1024px) {
            #mainReportArea {
                zoom: 0.6; /* Auto-scale for tablets */
            }
        }
        @media (max-width: 768px) {
            #mainReportArea {
                zoom: 0.4; /* Auto-scale for phones */
            }
        }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-black/95 z-[9999] hidden flex-col items-center justify-center text-white">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-cyan-500 mb-4"></div>
        <p class="font-bold tracking-widest uppercase text-[10px] text-cyan-400">Syncing Matrix...</p>
    </div>

    <nav class="bg-black/80 backdrop-blur-md border-b border-white/10 text-white p-4 sticky top-0 z-50 no-print flex justify-between items-center shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="bg-orange-500 p-1.5 rounded-md">
                <i class="fas fa-bolt text-black text-sm"></i>
            </div>
            <h1 class="font-black text-xs tracking-[0.2em] uppercase bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">DHANMONDI SC</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="switchTab('entry')" class="border border-cyan-500/50 hover:bg-cyan-500 hover:text-black px-4 py-2 rounded-full text-[9px] font-black transition-all">ENTRY</button>
            <button onclick="switchTab('history')" class="border border-orange-500/50 hover:bg-orange-500 hover:text-black px-4 py-2 rounded-full text-[9px] font-black transition-all">HISTORY</button>
        </div>
    </nav>

    <div id="entrySection" class="p-2 md:p-6">
        <div id="mainReportArea">
            <div class="report-paper">
                <input type="hidden" id="editingId" value="">
                <div class="text-center mb-8">
                    <h1 class="sc-title">DHANMONDI SC</h1>
                    <div class="flex items-center justify-center gap-4 mt-2">
                        <span class="h-[1px] w-12 bg-cyan-500/50"></span>
                        <p class="text-[10px] font-bold tracking-[0.6em] uppercase text-cyan-400">Daily Activity Report</p>
                        <span class="h-[1px] w-12 bg-cyan-500/50"></span>
                    </div>
                </div>

                <div class="flex justify-between items-end mb-6 px-4">
                    <div class="space-y-3">
                        <p class="text-[11px] font-bold text-gray-400">ASSIGNED BY: <input type="text" id="assignedBy" class="header-input w-48 uppercase" value="MD AZMIR HOSSAIN"></p>
                        <p class="text-[11px] font-bold text-gray-400">NAME: <input type="text" id="userName" class="header-input w-48 uppercase" value="SM FAISAL AHMED"></p>
                        <div class="flex gap-4">
                            <p class="text-[11px] font-bold text-gray-400">HR ID: <input type="text" id="hrId" class="header-input w-24 text-orange-400" value="0036"></p>
                            <p class="text-[11px] font-bold text-gray-400">DESIG: <input type="text" id="userDesig" class="header-input w-48 uppercase" value="SENIOR SUPERVISOR"></p>
                        </div>
                    </div>
                    <div class="text-right space-y-3">
                        <p class="text-[11px] font-bold text-gray-400">DATE: <input type="date" id="reportDate" class="header-input w-36"></p>
                        <div class="flex gap-4 justify-end">
                            <p class="text-[11px] font-bold text-gray-400">START: <input type="time" id="startTime" class="header-input w-24"></p>
                            <p class="text-[11px] font-bold text-gray-400">END: <input type="time" id="endTime" class="header-input w-24"></p>
                        </div>
                        <div class="flex justify-end gap-4 text-[10px] font-bold no-print">
                            <label class="flex items-center gap-2 cursor-pointer text-cyan-400"><input type="radio" name="shiftOpt" id="shiftDay" checked class="accent-cyan-400"> DAY</label>
                            <label class="flex items-center gap-2 cursor-pointer text-orange-400"><input type="radio" name="shiftOpt" id="shiftNight" class="accent-orange-400"> NIGHT</label>
                        </div>
                    </div>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 40px;">SL</th>
                                <th style="width: 140px;">Client</th>
                                <th style="width: 120px;">Site Code</th>
                                <th style="width: 300px;">Work Details</th>
                                <th style="width: 110px;">Category</th>
                                <th style="width: 120px;">Assign By</th>
                                <th style="width: 120px;">Team/Person</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>

                <div class="flex justify-between mt-20 px-10">
                    <div class="border-t border-gray-700 w-48 text-center text-[9px] font-black tracking-widest text-gray-500 pt-2 uppercase">Submitted By</div>
                    <div class="border-t border-gray-700 w-48 text-center text-[9px] font-black tracking-widest text-gray-500 pt-2 uppercase">Checked By</div>
                    <div class="border-t border-gray-700 w-48 text-center text-[9px] font-black tracking-widest text-gray-500 pt-2 uppercase">Received By</div>
                </div>
            </div>
        </div>
        
        <div class="fixed bottom-6 right-6 flex flex-col gap-4 no-print">
            <button onclick="init()" class="bg-gray-800 border border-cyan-500/30 text-cyan-400 w-12 h-12 rounded-full shadow-[0_0_15px_rgba(0,242,255,0.2)] flex items-center justify-center hover:scale-110 transition-all"><i class="fas fa-redo-alt"></i></button>
            <button onclick="saveData()" class="bg-gradient-to-br from-orange-500 to-orange-700 text-white w-16 h-16 rounded-full shadow-[0_0_20px_rgba(255,140,0,0.4)] flex items-center justify-center hover:scale-110 active:scale-90 transition-all border-2 border-white/20"><i class="fas fa-cloud-upload-alt text-2xl"></i></button>
        </div>
    </div>

    <div id="historySection" class="hidden p-4 md:p-8 max-w-4xl mx-auto no-print">
        <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
            <h2 class="text-cyan-400 font-black text-xl tracking-tighter uppercase">Cloud Archive</h2>
            <button onclick="toggleSelectAll()" id="selBtn" class="bg-white/5 hover:bg-white/10 text-gray-400 px-4 py-2 rounded-full text-[10px] font-bold border border-white/10 uppercase transition-all">Select All</button>
        </div>
        <div id="historyList" class="grid gap-3 mb-32"></div>
        
        <div class="fixed bottom-0 left-0 w-full bg-black/80 backdrop-blur-xl p-6 flex flex-wrap justify-center gap-3 border-t border-white/10 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
            <button onclick="generateFinalPDF(true)" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-3 rounded-full font-black text-[10px] uppercase shadow-lg shadow-sky-600/20 transition-all">Telegram</button>
            <button onclick="generateFinalPDF(false)" class="bg-zinc-800 hover:bg-zinc-700 text-white px-6 py-3 rounded-full font-black text-[10px] uppercase border border-white/10 transition-all">PDF</button>
            <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-full font-black text-[10px] uppercase shadow-lg shadow-emerald-600/20 transition-all">Excel</button>
            <button onclick="directPrint()" class="bg-orange-500 hover:bg-orange-400 text-white px-6 py-3 rounded-full font-black text-[10px] uppercase shadow-lg shadow-orange-500/20 transition-all">Print</button>
        </div>
    </div>

    <div id="printContainer"></div>

    <script>
        // Logics are kept exactly the same as provided
        const firebaseConfig = { databaseURL: "https://infinite-v1-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref('reports');
        const botToken = "8582534427:AAHq4TfwFqBIy1wU9mp6bDNQGSeSD49yX94";
        const chatId = "682844989";
        const DB_KEY = 'prof_stable_v26_final';

        function init() {
            document.getElementById('editingId').value = "";
            const tb = document.getElementById('tableBody');
            tb.innerHTML = '';
            for(let i=1; i<=12; i++) {
                tb.innerHTML += `<tr>
                    <td class="font-bold text-cyan-500 bg-white/5">${i}</td>
                    <td><input type="text" class="table-input client"></td>
                    <td><input type="text" class="table-input font-bold text-orange-400 site uppercase"></td>
                    <td><input type="text" class="table-input text-left px-3 work"></td>
                    <td>
                        <select class="table-input category text-cyan-300">
                            <option value="" class="bg-zinc-900">-</option>
                            <option value="Operation" class="bg-zinc-900">Operation</option>
                            <option value="Implementation" class="bg-zinc-900">Implementation</option>
                            <option value="PM" class="bg-zinc-900">PM</option>
                            <option value="Others" class="bg-zinc-900">Others</option>
                        </select>
                    </td>
                    <td><input type="text" class="table-input assignBy"></td>
                    <td><input type="text" class="table-input team"></td>
                </tr>`;
            }
            document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('startTime').value = "09:00";
            document.getElementById('endTime').value = "18:00";
        }
        init();

        dbRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                const reportsArray = Object.keys(data).map(key => data[key]);
                localStorage.setItem(DB_KEY, JSON.stringify(reportsArray));
                if(!document.getElementById('historySection').classList.contains('hidden')) renderHistory();
            }
        });

        function switchTab(t) {
            document.getElementById('entrySection').classList.toggle('hidden', t !== 'entry');
            document.getElementById('historySection').classList.toggle('hidden', t !== 'history');
            if(t === 'history') renderHistory();
        }

        async function saveData() {
            document.getElementById('loader').style.display = 'flex';
            const editingId = document.getElementById('editingId').value;
            const rows = Array.from(document.querySelectorAll('#tableBody tr')).map(tr => ({
                c: tr.querySelector('.client').value, s: tr.querySelector('.site').value,
                w: tr.querySelector('.work').value, cat: tr.querySelector('.category').value,
                ab: tr.querySelector('.assignBy').value, t: tr.querySelector('.team').value
            }));

            const dataId = editingId ? editingId : Date.now().toString();
            const data = { 
                id: dataId, date: document.getElementById('reportDate').value, 
                startTime: document.getElementById('startTime').value, endTime: document.getElementById('endTime').value,
                hr: document.getElementById('hrId').value, assigned: document.getElementById('assignedBy').value,
                shift: document.getElementById('shiftDay').checked ? 'DAY' : 'NIGHT', rows 
            };

            try {
                await dbRef.child(dataId).set(data);
                alert("Data Synced to Nebula!");
                init();
                switchTab('history');
            } catch (e) { alert("Error: " + e.message); }
            document.getElementById('loader').style.display = 'none';
        }

        function renderHistory() {
            const db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            const list = document.getElementById('historyList');
            if(db.length === 0) { list.innerHTML = `<div class="text-center text-gray-600 py-20 bg-white/5 rounded-2xl border border-dashed border-white/10">No transmission history found.</div>`; return; }
            list.innerHTML = db.slice().reverse().map(h => `
                <div class="bg-zinc-900/50 p-4 rounded-xl border border-white/5 flex items-center justify-between hover:border-cyan-500/30 transition-all group">
                    <div class="flex items-center gap-4 flex-1 cursor-pointer" onclick="editReport('${h.id}')">
                        <input type="checkbox" class="db-chk h-5 w-5 rounded accent-cyan-500" value="${h.id}" onclick="event.stopPropagation()">
                        <div>
                            <p class="font-black text-[11px] text-cyan-400 tracking-wider">${h.date} <span class="mx-2 text-gray-700">|</span> ${h.shift}</p>
                            <p class="text-[9px] text-gray-500 uppercase mt-1">Sub-Center Head : ${h.assigned}</p>
                        </div>
                    </div>
                    <button class="text-gray-600 hover:text-red-400 p-2 transition-colors" onclick="deleteItem('${h.id}')"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        // Functions editReport, deleteItem, toggleSelectAll, exportToExcel, directPrint, generateFinalPDF, generatePrintHTML 
        // would follow exactly the same implementation as in your original code to ensure zero functionality loss.
        // Copying remaining logic...
        
        function editReport(id) {
            const db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            const data = db.find(x => x.id == id);
            if (!data) return;
            switchTab('entry');
            document.getElementById('editingId').value = data.id;
            document.getElementById('reportDate').value = data.date;
            document.getElementById('startTime').value = data.startTime;
            document.getElementById('endTime').value = data.endTime;
            document.getElementById('assignedBy').value = data.assigned;
            document.getElementById('hrId').value = data.hr;
            data.shift === 'DAY' ? document.getElementById('shiftDay').checked = true : document.getElementById('shiftNight').checked = true;
            const tableRows = document.querySelectorAll('#tableBody tr');
            data.rows.forEach((row, i) => {
                if(tableRows[i]) {
                    tableRows[i].querySelector('.client').value = row.c;
                    tableRows[i].querySelector('.site').value = row.s;
                    tableRows[i].querySelector('.work').value = row.w;
                    tableRows[i].querySelector('.category').value = row.cat;
                    tableRows[i].querySelector('.assignBy').value = row.ab;
                    tableRows[i].querySelector('.team').value = row.t;
                }
            });
        }

        function deleteItem(id) { if(confirm("Terminate this record?")) { dbRef.child(id).remove(); renderHistory(); } }

        function toggleSelectAll() {
            const chks = document.querySelectorAll('.db-chk');
            const allSel = Array.from(chks).every(c => c.checked);
            chks.forEach(c => c.checked = !allSel);
            document.getElementById('selBtn').innerText = allSel ? "Select All" : "Unselect All";
        }

        function exportToExcel() {
            const selected = document.querySelectorAll('.db-chk:checked');
            if (selected.length === 0) return alert("Select records.");
            const db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            const finalData = [["Date", "Shift", "Assigned By", "SL", "Client", "Site Code", "Work Details", "Category", "Assign By", "Team"]];
            selected.forEach(chk => {
                const h = db.find(x => x.id == chk.value);
                if(h) h.rows.forEach((r, i) => {
                    if(r.c || r.s) finalData.push([h.date, h.shift, h.assigned, i+1, r.c, r.s, r.w, r.cat, r.ab, r.t]);
                });
            });
            const ws = XLSX.utils.aoa_to_sheet(finalData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Reports");
            XLSX.writeFile(wb, `Dhanmondi_SC_${Date.now()}.xlsx`);
        }

        function directPrint() {
            const selected = document.querySelectorAll('.db-chk:checked');
            if(selected.length === 0) return alert("Select a record.");
            const db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            const printCont = document.getElementById('printContainer');
            printCont.innerHTML = '';
            selected.forEach(chk => {
                const data = db.find(x => x.id == chk.value);
                const page = document.createElement('div');
                page.className = 'print-page-break';
                page.innerHTML = generatePrintHTML(data);
                printCont.appendChild(page);
            });
            setTimeout(() => { window.print(); }, 500);
        }

        async function generateFinalPDF(isTelegram) {
            const selected = document.querySelectorAll('.db-chk:checked');
            if(selected.length === 0) return alert("Select a record.");
            document.getElementById('loader').style.display = 'flex';
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('l', 'mm', 'a4');
            const db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            for(let i=0; i < selected.length; i++) {
                const data = db.find(x => x.id == selected[i].value);
                const tempDiv = document.createElement('div');
                tempDiv.style.width = '297mm'; tempDiv.style.position = 'absolute'; tempDiv.style.left = '-9999px';
                tempDiv.innerHTML = generatePrintHTML(data);
                document.body.appendChild(tempDiv);
                const canvas = await html2canvas(tempDiv, { scale: 2 });
                if(i > 0) pdf.addPage();
                pdf.addImage(canvas.toDataURL('image/jpeg', 1.0), 'JPEG', 0, 0, 297, 210);
                document.body.removeChild(tempDiv);
            }
            if(isTelegram) {
                const blob = pdf.output('blob');
                const fd = new FormData();
                fd.append('chat_id', chatId);
                fd.append('document', blob, `Report_${Date.now()}.pdf`);
                await fetch(`https://api.telegram.org/bot${botToken}/sendDocument`, { method: 'POST', body: fd });
                alert("Matrix Sent to Telegram!");
            } else { pdf.save(`Report_${Date.now()}.pdf`); }
            document.getElementById('loader').style.display = 'none';
        }

        function generatePrintHTML(data) {
            let rowsHtml = data.rows.map((r, i) => `<tr><td>${i+1}</td><td>${r.c}</td><td style="color:#2563eb; font-weight:bold;">${r.s}</td><td style="text-align:left; padding-left:5px;">${r.w}</td><td>${r.cat}</td><td>${r.ab}</td><td>${r.t}</td></tr>`).join('');
            return `
            <div class="report-paper" style="background:white; color:black;">
                <div style="text-align:center; margin-bottom:10px;">
                    <h1 style="font-size:38px; margin:0; letter-spacing:3px; color:black;">DHANMONDI SC</h1>
                    <p style="font-size:10px; font-weight:bold; letter-spacing:5px; color:#666;">DAILY ACTIVITY REPORT</p>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:15px; font-weight:bold; color:black;">
                    <div>ASSIGNED BY: ${data.assigned}<br>NAME: SM FAISAL AHMED<br>HR ID: ${data.hr}<br>DESIG: SENIOR SUPERVISOR</div>
                    <div style="text-align:right;">DATE: ${data.date}<br>START: ${data.startTime} END: ${data.endTime}<br>SHIFT: ${data.shift}</div>
                </div>
                <table style="width:100%; border-collapse:collapse; text-align:center; font-size:10px; border:1.5px solid black; color:black;">
                    <thead><tr style="background:#f0f0f0; height:35px; color:black;"><th>SL</th><th>Client</th><th>Site Code</th><th style="width:250px;">Work Details</th><th>Category</th><th>Assign By</th><th>Team/Person</th></tr></thead>
                    <tbody>${rowsHtml}</tbody>
                </table>
                <div style="display:flex; justify-content:space-between; margin-top:80px; padding:0 50px;">
                    <div style="border-top:1px solid black; width:150px; text-align:center; font-size:10px; font-weight:bold; color:black;">SUBMITTED BY</div>
                    <div style="border-top:1px solid black; width:150px; text-align:center; font-size:10px; font-weight:bold; color:black;">CHECKED BY</div>
                    <div style="border-top:1px solid black; width:150px; text-align:center; font-size:10px; font-weight:bold; color:black;">RECEIVED BY</div>
                </div>
            </div>`;
        }
    </script>
</body>
</html>
