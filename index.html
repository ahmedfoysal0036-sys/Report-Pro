<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMED_V16 | Batch Master Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background: #e2e8f0; margin: 0; padding: 0; overflow-x: hidden; }
        
        .report-outer-container {
            width: 100%;
            overflow-x: auto;
            padding: 10px 0;
            display: flex;
            justify-content: flex-start;
        }

        .report-paper { 
            width: 285mm; 
            height: 195mm; 
            background: white !important; 
            padding: 8mm; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-shrink: 0;
            margin: auto;
            color: black !important;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 5px; border: 1.5px solid black; background: white; }
        th, td { border: 1px solid black; padding: 4px; text-align: center; font-size: 11px; vertical-align: middle; color: black; }
        
        .input-field { width: 100%; border: none; outline: none; background: transparent; text-align: center; font-size: 11px; }
        .header-input { border-bottom: 1px solid black; outline: none; font-weight: bold; background: transparent; }
        
        .sig-box { border-top: 1.5px solid black; width: 160px; text-align: center; font-size: 10px; font-weight: bold; margin-bottom: 10px; }

        /* UPGRADE 2: CSS TRICK FOR RENDERING */
        #batchContainer {
            position: fixed;
            left: 0;
            top: 0;
            width: 297mm;
            z-index: -9999;
            background: white;
            visibility: visible;
            pointer-events: none;
        }

        .html2pdf__page-break { page-break-before: always; }
        @media print { .no-print { display: none !important; } }
        @media (min-width: 300mm) { .report-outer-container { justify-content: center; } }
    </style>
</head>
<body>

    <nav class="bg-slate-900 text-white p-3 sticky top-0 z-50 no-print flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2">
            <i class="fas fa-layer-group text-amber-400"></i>
            <h1 class="font-bold text-xs uppercase tracking-widest">Ahmed_V16 | Pro</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="switchTab('entry')" class="bg-blue-600 px-3 py-1.5 rounded text-[10px] font-bold">ENTRY</button>
            <button onclick="switchTab('history')" class="bg-slate-700 px-3 py-1.5 rounded text-[10px] font-bold">HISTORY DB</button>
        </div>
    </nav>

    <div id="entrySection" class="hidden">
        <div class="report-outer-container">
            <div id="singleReportArea">
                <div class="report-paper">
                    <div class="flex justify-between items-start">
                        <div class="w-1/3 space-y-2">
                            <p class="text-[11px] font-bold uppercase">ASSIGNED BY: <input type="text" id="assignedBy" class="header-input w-40" value="MD AZMIR HOSSAIN"></p>
                            <p class="text-[11px] font-bold uppercase">NAME: <input type="text" id="userName" class="header-input w-48" value="SM FAISAL AHMED"></p>
                            <p class="text-[11px] font-bold uppercase">DESIGNATION: <input type="text" id="userDesig" class="header-input w-40" value="SENIOR SUPERVISOR"></p>
                        </div>
                        <div class="text-center">
                            <h1 class="font-bold text-2xl uppercase text-slate-900">Dhanmondi SC</h1>
                            <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-blue-600">Daily Activity Report</p>
                        </div>
                        <div class="w-1/3 text-right space-y-2">
                            <p class="text-[11px] font-bold">DATE: <input type="date" id="reportDate" class="border rounded px-1 font-bold"></p>
                            <div class="flex justify-end gap-3 text-[10px] font-bold">
                                <label><input type="checkbox" id="shiftDay" checked> DAY</label>
                                <label><input type="checkbox" id="shiftNight"> NIGHT</label>
                            </div>
                        </div>
                    </div>

                    <table id="mainTable">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="w-[4%]">SL</th>
                                <th class="w-[10%]">Client</th>
                                <th class="w-[12%]">Site Code</th>
                                <th class="w-[34%]">Work Details</th>
                                <th class="w-[7%] text-[9px]">Operation</th>
                                <th class="w-[7%] text-[9px]">Implementation</th>
                                <th class="w-[7%] text-[9px]">PM</th>
                                <th class="w-[7%] text-[9px]">Others</th>
                                <th class="w-[12%]">Remarks</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>

                    <div class="flex justify-between px-8">
                        <div class="sig-box">SUBMITTED BY</div>
                        <div class="sig-box">CHECKED BY</div>
                        <div class="sig-box">RECEIVED BY</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="fixed bottom-5 right-5 flex flex-col gap-2 no-print">
            <button onclick="saveCurrentData()" class="bg-amber-500 hover:bg-amber-600 text-white p-4 rounded-full shadow-xl">
                <i class="fas fa-save text-xl"></i>
            </button>
        </div>
    </div>

    <div id="historySection" class="p-4 max-w-5xl mx-auto min-h-screen no-print">
        <div class="bg-white rounded-xl shadow-lg border p-6">
            <div class="flex justify-between items-center mb-6 pb-4 border-b">
                <h2 class="font-bold text-xl text-slate-800"><i class="fas fa-database text-blue-500 mr-2"></i>History Log</h2>
                <div class="flex gap-2">
                    <button onclick="selectAll()" class="text-blue-600 text-xs font-bold hover:underline">Select All</button>
                    <span class="text-gray-300">|</span>
                    <button onclick="clearHistory()" class="text-red-500 text-xs font-bold hover:underline">Clear All</button>
                </div>
            </div>
            <div id="historyList" class="space-y-3 mb-24"></div>
        </div>

        <div class="fixed bottom-0 left-0 w-full bg-white border-t p-4 shadow-2xl flex justify-between items-center z-50">
            <span id="selectCount" class="font-bold text-slate-600 text-sm ml-4">0 Selected</span>
            <div class="flex gap-2 mr-4">
                <button id="btnSend" onclick="processBatchPDF(true)" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold text-[10px] shadow-lg flex items-center gap-1">
                    <i class="fab fa-telegram-plane"></i> SEND
                </button>
                <button id="btnPdf" onclick="processBatchPDF(false)" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold text-[10px] shadow-lg flex items-center gap-1">
                    <i class="fas fa-file-pdf"></i> PDF
                </button>
            </div>
        </div>
    </div>

    <div id="batchContainer"></div>

    <script>
        const botToken = "8582534427:AAHq4TfwFqBIy1wU9mp6bDNQGSeSD49yX94";
        const chatId = "682844989";
        
        document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
        initRows();
        switchTab('entry');

        function initRows() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            for(let i=1; i<=10; i++) {
                tbody.innerHTML += `
                    <tr>
                        <td class="h-10 font-bold">${i}</td>
                        <td><input type="text" class="input-field client"></td>
                        <td><input type="text" class="input-field site font-bold text-blue-800 uppercase"></td>
                        <td><input type="text" class="input-field text-left px-1 work"></td>
                        <td><input type="checkbox" class="cb1 scale-125"></td>
                        <td><input type="checkbox" class="cb2 scale-125"></td>
                        <td><input type="checkbox" class="cb3 scale-125"></td>
                        <td><input type="checkbox" class="cb4 scale-125"></td>
                        <td><input type="text" class="input-field remarks"></td>
                    </tr>`;
            }
        }

        function switchTab(tab) {
            document.getElementById('entrySection').style.display = tab === 'entry' ? 'block' : 'none';
            document.getElementById('historySection').style.display = tab === 'history' ? 'block' : 'none';
            if(tab === 'history') renderHistory();
        }

        function saveCurrentData() {
            const data = {
                id: Date.now(),
                date: document.getElementById('reportDate').value,
                assigned: document.getElementById('assignedBy').value,
                rows: Array.from(document.querySelectorAll('#tableBody tr')).map(tr => ({
                    client: tr.querySelector('.client').value,
                    site: tr.querySelector('.site').value,
                    work: tr.querySelector('.work').value,
                    c1: tr.querySelector('.cb1').checked,
                    c2: tr.querySelector('.cb2').checked,
                    c3: tr.querySelector('.cb3').checked,
                    c4: tr.querySelector('.cb4').checked,
                    rem: tr.querySelector('.remarks').value
                }))
            };
            let history = JSON.parse(localStorage.getItem('prof_v16_db')) || [];
            history.push(data);
            localStorage.setItem('prof_v16_db', JSON.stringify(history));
            alert("✅ Data Saved!");
            switchTab('history');
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            let history = JSON.parse(localStorage.getItem('prof_v16_db')) || [];
            if(history.length === 0) { list.innerHTML = '<p class="text-center py-10 text-gray-400">Database Empty</p>'; return; }
            list.innerHTML = [...history].reverse().map(h => `
                <div class="flex items-center gap-3 p-3 bg-slate-50 border rounded-lg hover:border-blue-300 transition-all">
                    <input type="checkbox" class="history-chk w-5 h-5" value="${h.id}" onchange="updateCount()">
                    <div class="flex-1 cursor-pointer" onclick="loadReport(${h.id})">
                        <p class="font-bold text-sm">📅 ${h.date}</p>
                        <p class="text-[10px] text-gray-500 uppercase">${h.assigned}</p>
                    </div>
                    <button onclick="loadReport(${h.id})" class="text-blue-600 text-[10px] font-bold px-2 py-1 border border-blue-600 rounded">EDIT</button>
                </div>`).join('');
            updateCount();
        }

        function loadReport(id) {
            let history = JSON.parse(localStorage.getItem('prof_v16_db')) || [];
            const h = history.find(item => item.id == id);
            if(!h) return;
            document.getElementById('reportDate').value = h.date;
            document.getElementById('assignedBy').value = h.assigned;
            const rows = document.querySelectorAll('#tableBody tr');
            h.rows.forEach((r, i) => {
                rows[i].querySelector('.client').value = r.client;
                rows[i].querySelector('.site').value = r.site;
                rows[i].querySelector('.work').value = r.work;
                rows[i].querySelector('.cb1').checked = r.c1;
                rows[i].querySelector('.cb2').checked = r.c2;
                rows[i].querySelector('.cb3').checked = r.c3;
                rows[i].querySelector('.cb4').checked = r.c4;
                rows[i].querySelector('.remarks').value = r.rem;
            });
            switchTab('entry');
        }

        function updateCount() {
            const count = document.querySelectorAll('.history-chk:checked').length;
            document.getElementById('selectCount').innerText = `${count} Selected`;
        }
        function selectAll() { document.querySelectorAll('.history-chk').forEach(cb => cb.checked = true); updateCount(); }
        function clearHistory() { if(confirm("Clear database?")) { localStorage.removeItem('prof_v16_db'); renderHistory(); } }

        // --- UPGRADE 1 & 3: IMPROVED PDF LOGIC ---
        async function processBatchPDF(sendToTelegram) {
            const checkedBoxes = document.querySelectorAll('.history-chk:checked');
            if(checkedBoxes.length === 0) { alert("Select reports first!"); return; }
            
            // ১. স্ক্রল টপে আনা (মোবাইলে ব্ল্যাঙ্ক আসা রোধ করতে)
            window.scrollTo(0, 0);

            const container = document.getElementById('batchContainer');
            container.innerHTML = '';
            let history = JSON.parse(localStorage.getItem('prof_v16_db')) || [];
            
            checkedBoxes.forEach((cb, idx) => {
                const data = history.find(h => h.id == cb.value);
                if(data) {
                    container.innerHTML += generateReportHTML(data);
                    if(idx < checkedBoxes.length - 1) container.innerHTML += '<div class="html2pdf__page-break"></div>';
                }
            });

            // ২. রেন্ডারিং টাইমআউট (অপেক্ষা করা যেন কন্টেন্ট লোড হয়)
            await new Promise(r => setTimeout(r, 800));

            const opt = {
                margin: 0,
                filename: `Reports_Archive.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true, 
                    letterRendering: true,
                    scrollY: 0,
                    scrollX: 0,
                    windowWidth: 1200
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };

            try {
                const worker = html2pdf().set(opt).from(container);
                if (sendToTelegram) {
                    const pdfBlob = await worker.output('blob');
                    const fd = new FormData();
                    fd.append('chat_id', chatId);
                    fd.append('document', pdfBlob, `Batch_Report_${Date.now()}.pdf`);
                    const response = await fetch(`https://api.telegram.org/bot${botToken}/sendDocument`, { method: 'POST', body: fd });
                    if(response.ok) alert("✅ PDF Sent to Telegram!");
                    else alert("❌ Failed to send to Telegram.");
                } else {
                    await worker.save();
                }
            } catch (err) { 
                console.error(err);
                alert("Generation Error: " + err.message); 
            } finally {
                container.innerHTML = ''; // Memory cleanup
            }
        }

        function generateReportHTML(data) {
            let rHtml = '';
            for(let i=0; i<10; i++) {
                const r = data.rows[i] || {};
                rHtml += `<tr>
                    <td style="height:38px; font-weight:bold; border:1px solid black; color:black;">${i+1}</td>
                    <td style="border:1px solid black; color:black;">${r.client||''}</td>
                    <td style="border:1px solid black; font-weight:bold; color:#1e40af;">${r.site||''}</td>
                    <td style="border:1px solid black; text-align:left; padding-left:4px; color:black;">${r.work||''}</td>
                    <td style="border:1px solid black; color:black;">${r.c1?'✔':''}</td>
                    <td style="border:1px solid black; color:black;">${r.c2?'✔':''}</td>
                    <td style="border:1px solid black; color:black;">${r.c3?'✔':''}</td>
                    <td style="border:1px solid black; color:black;">${r.c4?'✔':''}</td>
                    <td style="border:1px solid black; color:black;">${r.rem||''}</td>
                </tr>`;
            }
            // UPGRADE: Inline Background & Text colors fixed
            return `
            <div class="report-paper" style="background: white !important; color: black !important; margin: 0 auto;">
                <div style="display:flex; justify-content:space-between; align-items:start;">
                    <div style="font-size:10px; font-weight:bold; line-height:1.6; color:black;">
                        <p>ASSIGNED BY: ${data.assigned}</p>
                        <p>NAME: SM FAISAL AHMED</p>
                        <p>DESIGNATION: SENIOR SUPERVISOR</p>
                    </div>
                    <div style="text-align:center;">
                        <h1 style="font-size:22px; margin:0; color:black; font-weight:bold;">DHANMONDI SC</h1>
                        <p style="font-size:9px; letter-spacing:3px; color:#2563eb; font-weight:bold;">DAILY ACTIVITY REPORT</p>
                    </div>
                    <div style="text-align:right; font-size:10px; font-weight:bold; color:black;">DATE: ${data.date}</div>
                </div>
                <table style="width:100%; border-collapse:collapse; border:1.5px solid black; font-size:10px; text-align:center; background:white;">
                    <thead style="background:#f1f5f9;">
                        <tr>
                            <th style="border:1px solid black; color:black;">SL</th>
                            <th style="border:1px solid black; color:black;">Client</th>
                            <th style="border:1px solid black; color:black;">Site Code</th>
                            <th style="border:1px solid black; color:black;">Work Details</th>
                            <th style="border:1px solid black; color:black;">OP</th>
                            <th style="border:1px solid black; color:black;">IM</th>
                            <th style="border:1px solid black; color:black;">PM</th>
                            <th style="border:1px solid black; color:black;">OT</th>
                            <th style="border:1px solid black; color:black;">Remarks</th>
                        </tr>
                    </thead>
                    <tbody>${rHtml}</tbody>
                </table>
                <div style="display:flex; justify-content:space-between; padding:0 30px;">
                    <div style="border-top:1px solid black; width:140px; text-align:center; font-size:9px; font-weight:bold; padding-top:5px; color:black;">SUBMITTED BY</div>
                    <div style="border-top:1px solid black; width:140px; text-align:center; font-size:9px; font-weight:bold; padding-top:5px; color:black;">CHECKED BY</div>
                    <div style="border-top:1px solid black; width:140px; text-align:center; font-size:9px; font-weight:bold; padding-top:5px; color:black;">RECEIVED BY</div>
                </div>
            </div>`;
        }
    </script>
</body>
</html>
