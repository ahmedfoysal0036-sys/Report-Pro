<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMED_V16 | Batch Master Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background: #e2e8f0; margin: 0; padding: 0; }
        
        .report-outer-container { width: 100%; overflow-x: auto; padding: 10px 0; display: flex; justify-content: flex-start; }

        /* A4 Landscape Layout */
        .report-paper { 
            width: 285mm; height: 195mm; background: white !important; padding: 8mm; 
            position: relative; display: flex; flex-direction: column; justify-content: space-between; 
            margin: auto; color: black !important; border: 1px solid #ccc;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 5px; border: 1.5px solid black; }
        th, td { border: 1px solid black; padding: 4px; text-align: center; font-size: 11px; color: black !important; }
        
        .input-field { width: 100%; border: none; outline: none; background: transparent; text-align: center; font-size: 11px; }
        .header-input { border-bottom: 1px solid black; outline: none; font-weight: bold; }
        
        .sig-box { border-top: 1.5px solid black; width: 160px; text-align: center; font-size: 10px; font-weight: bold; margin-top: 20px; }

        .html2pdf__page-break { page-break-before: always; }
        @media print { .no-print { display: none !important; } }
        
        /* Loading Overlay */
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; flex-direction:column; justify-content:center; align-items:center; color:white; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-circle-notch fa-spin text-4xl mb-2"></i><p>Generating PDF... Please wait</p></div>

    <nav class="bg-slate-900 text-white p-3 sticky top-0 z-50 no-print flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fas fa-layer-group text-amber-400"></i>
            <h1 class="font-bold text-xs uppercase tracking-widest">Ahmed_V16 | Pro</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="switchTab('entry')" class="bg-blue-600 px-3 py-1.5 rounded text-[10px] font-bold">ENTRY</button>
            <button onclick="switchTab('history')" class="bg-slate-700 px-3 py-1.5 rounded text-[10px] font-bold">HISTORY DB</button>
        </div>
    </nav>

    <div id="entrySection">
        <div class="report-outer-container">
            <div id="mainReportArea">
                <div class="report-paper">
                    <div class="flex justify-between items-start">
                        <div class="w-1/3 space-y-2">
                            <p class="text-[11px] font-bold">ASSIGNED BY: <input type="text" id="assignedBy" class="header-input w-40" value="MD AZMIR HOSSAIN"></p>
                            <p class="text-[11px] font-bold">NAME: <input type="text" id="userName" class="header-input w-48" value="SM FAISAL AHMED"></p>
                            <p class="text-[11px] font-bold">DESIGNATION: <input type="text" id="userDesig" class="header-input w-40" value="SENIOR SUPERVISOR"></p>
                        </div>
                        <div class="text-center">
                            <h1 class="font-bold text-2xl uppercase">Dhanmondi SC</h1>
                            <p class="text-[10px] font-bold tracking-[0.3em] text-blue-600">Daily Activity Report</p>
                        </div>
                        <div class="w-1/3 text-right space-y-2">
                            <p class="text-[11px] font-bold">DATE: <input type="date" id="reportDate" class="border rounded px-1 font-bold"></p>
                            <div class="flex justify-end gap-3 text-[10px] font-bold">
                                <label><input type="checkbox" id="shiftDay" checked> DAY</label>
                                <label><input type="checkbox" id="shiftNight"> NIGHT</label>
                            </div>
                        </div>
                    </div>

                    <table id="mainTable">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="w-[4%]">SL</th>
                                <th class="w-[10%]">Client</th>
                                <th class="w-[12%]">Site Code</th>
                                <th class="w-[34%]">Work Details</th>
                                <th class="w-[7%]">Operation</th>
                                <th class="w-[7%]">Implement</th>
                                <th class="w-[7%]">PM</th>
                                <th class="w-[7%]">OT</th>
                                <th class="w-[12%]">Remarks</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>

                    <div class="flex justify-between px-8">
                        <div class="sig-box">SUBMITTED BY</div>
                        <div class="sig-box">CHECKED BY</div>
                        <div class="sig-box">RECEIVED BY</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="fixed bottom-5 right-5 flex flex-col gap-2 no-print">
            <button onclick="saveCurrentData()" class="bg-amber-500 text-white p-4 rounded-full shadow-xl">
                <i class="fas fa-save text-xl"></i>
            </button>
        </div>
    </div>

    <div id="historySection" class="p-4 max-w-5xl mx-auto hidden no-print">
        <div class="bg-white rounded-xl shadow-lg border p-6">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="font-bold text-xl text-slate-800">History Log</h2>
                <div class="flex gap-2">
                    <button onclick="selectAll()" class="text-blue-600 text-xs font-bold">Select All</button>
                    <button onclick="clearHistory()" class="text-red-500 text-xs font-bold">Clear All</button>
                </div>
            </div>
            <div id="historyList" class="space-y-3 mb-24"></div>
        </div>

        <div class="fixed bottom-0 left-0 w-full bg-white border-t p-4 flex justify-between items-center z-50">
            <span id="selectCount" class="font-bold text-slate-600 text-sm">0 Selected</span>
            <div class="flex gap-2">
                <button onclick="processBatchPDF(true)" class="bg-emerald-600 text-white px-5 py-2 rounded-lg font-bold text-xs">SEND TELEGRAM</button>
                <button onclick="processBatchPDF(false)" class="bg-red-600 text-white px-5 py-2 rounded-lg font-bold text-xs">DOWNLOAD PDF</button>
            </div>
        </div>
    </div>

    <script>
        const botToken = "8582534427:AAHq4TfwFqBIy1wU9mp6bDNQGSeSD49yX94";
        const chatId = "682844989";
        
        document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
        initRows();

        function initRows() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            for(let i=1; i<=10; i++) {
                tbody.innerHTML += `
                    <tr>
                        <td class="h-10 font-bold">${i}</td>
                        <td><input type="text" class="input-field client"></td>
                        <td><input type="text" class="input-field site font-bold text-blue-800 uppercase"></td>
                        <td><input type="text" class="input-field text-left px-1 work"></td>
                        <td><input type="checkbox" class="cb1 scale-125"></td>
                        <td><input type="checkbox" class="cb2 scale-125"></td>
                        <td><input type="checkbox" class="cb3 scale-125"></td>
                        <td><input type="checkbox" class="cb4 scale-125"></td>
                        <td><input type="text" class="input-field remarks"></td>
                    </tr>`;
            }
        }

        function switchTab(tab) {
            document.getElementById('entrySection').style.display = tab === 'entry' ? 'block' : 'none';
            document.getElementById('historySection').style.display = tab === 'history' ? 'block' : 'none';
            if(tab === 'history') renderHistory();
        }

        function saveCurrentData() {
            const data = {
                id: Date.now(),
                date: document.getElementById('reportDate').value,
                assigned: document.getElementById('assignedBy').value,
                rows: Array.from(document.querySelectorAll('#tableBody tr')).map(tr => ({
                    client: tr.querySelector('.client').value,
                    site: tr.querySelector('.site').value,
                    work: tr.querySelector('.work').value,
                    c1: tr.querySelector('.cb1').checked,
                    c2: tr.querySelector('.cb2').checked,
                    c3: tr.querySelector('.cb3').checked,
                    c4: tr.querySelector('.cb4').checked,
                    rem: tr.querySelector('.remarks').value
                }))
            };
            let history = JSON.parse(localStorage.getItem('prof_v16_db')) || [];
            history.push(data);
            localStorage.setItem('prof_v16_db', JSON.stringify(history));
            alert("✅ Saved!");
            switchTab('history');
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            let history = JSON.parse(localStorage.getItem('prof_v16_db')) || [];
            if(history.length === 0) { list.innerHTML = '<p class="text-center py-10">Empty</p>'; return; }
            list.innerHTML = [...history].reverse().map(h => `
                <div class="flex items-center gap-3 p-3 bg-slate-50 border rounded-lg">
                    <input type="checkbox" class="history-chk w-5 h-5" value="${h.id}" onchange="updateCount()">
                    <div class="flex-1">
                        <p class="font-bold text-sm">📅 ${h.date}</p>
                        <p class="text-[10px] text-gray-500">${h.assigned}</p>
                    </div>
                    <button onclick="loadReport(${h.id})" class="text-blue-600 text-xs font-bold">EDIT</button>
                </div>`).join('');
            updateCount();
        }

        function loadReport(id) {
            let history = JSON.parse(localStorage.getItem('prof_v16_db')) || [];
            const h = history.find(item => item.id == id);
            if(!h) return;
            document.getElementById('reportDate').value = h.date;
            document.getElementById('assignedBy').value = h.assigned;
            const rows = document.querySelectorAll('#tableBody tr');
            h.rows.forEach((r, i) => {
                rows[i].querySelector('.client').value = r.client;
                rows[i].querySelector('.site').value = r.site;
                rows[i].querySelector('.work').value = r.work;
                rows[i].querySelector('.cb1').checked = r.c1;
                rows[i].querySelector('.cb2').checked = r.c2;
                rows[i].querySelector('.cb3').checked = r.c3;
                rows[i].querySelector('.cb4').checked = r.c4;
                rows[i].querySelector('.remarks').value = r.rem;
            });
            switchTab('entry');
        }

        function updateCount() {
            document.getElementById('selectCount').innerText = `${document.querySelectorAll('.history-chk:checked').length} Selected`;
        }
        function selectAll() { document.querySelectorAll('.history-chk').forEach(cb => cb.checked = true); updateCount(); }
        function clearHistory() { if(confirm("Clear All?")) { localStorage.removeItem('prof_v16_db'); renderHistory(); } }

        // --- FINAL FIX: ON-SCREEN BATCH PROCESSING ---
        async function processBatchPDF(sendToTelegram) {
            const checkedBoxes = document.querySelectorAll('.history-chk:checked');
            if(checkedBoxes.length === 0) { alert("Select first!"); return; }
            
            document.getElementById('loader').style.display = 'flex';
            const history = JSON.parse(localStorage.getItem('prof_v16_db')) || [];
            const mainArea = document.getElementById('mainReportArea');
            const originalContent = mainArea.innerHTML; // Entry-র অরিজিনাল ডাটা সেভ রাখা
            
            let fullHTML = "";
            checkedBoxes.forEach((cb, idx) => {
                const data = history.find(h => h.id == cb.value);
                if(data) {
                    fullHTML += generatePDFTemplate(data);
                    if(idx < checkedBoxes.length - 1) fullHTML += '<div class="html2pdf__page-break"></div>';
                }
            });

            // Entry Section এ ডেটা পুশ করা যাতে ব্রাউজার ওটা রেন্ডার করে
            switchTab('entry');
            mainArea.innerHTML = fullHTML;
            window.scrollTo(0,0);

            // ব্রাউজারকে ডাটা পড়ার জন্য ১ সেকেন্ড সময় দেওয়া
            await new Promise(r => setTimeout(r, 1000));

            const opt = {
                margin: 0,
                filename: `Report_${Date.now()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, logging: false, scrollY: 0 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };

            try {
                if (sendToTelegram) {
                    const pdfBlob = await html2pdf().set(opt).from(mainArea).output('blob');
                    const fd = new FormData();
                    fd.append('chat_id', chatId);
                    fd.append('document', pdfBlob, `Reports_Batch.pdf`);
                    await fetch(`https://api.telegram.org/bot${botToken}/sendDocument`, { method: 'POST', body: fd });
                    alert("✅ Sent to Telegram!");
                } else {
                    await html2pdf().set(opt).from(mainArea).save();
                }
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                mainArea.innerHTML = originalContent; // আগের অবস্থায় ফিরিয়ে আনা
                document.getElementById('loader').style.display = 'none';
                switchTab('history');
            }
        }

        function generatePDFTemplate(data) {
            let trs = "";
            data.rows.forEach((r, i) => {
                trs += `<tr>
                    <td style="height:35px; border:1px solid black; font-weight:bold;">${i+1}</td>
                    <td style="border:1px solid black;">${r.client||''}</td>
                    <td style="border:1px solid black; font-weight:bold; color:#1e40af;">${r.site||''}</td>
                    <td style="border:1px solid black; text-align:left; padding-left:4px;">${r.work||''}</td>
                    <td style="border:1px solid black;">${r.c1?'✔':''}</td>
                    <td style="border:1px solid black;">${r.c2?'✔':''}</td>
                    <td style="border:1px solid black;">${r.c3?'✔':''}</td>
                    <td style="border:1px solid black;">${r.c4?'✔':''}</td>
                    <td style="border:1px solid black;">${r.rem||''}</td>
                </tr>`;
            });

            return `<div class="report-paper">
                <div style="display:flex; justify-content:space-between; align-items:start;">
                    <div style="font-size:10px; font-weight:bold; line-height:1.6;">
                        <p>ASSIGNED BY: ${data.assigned}</p>
                        <p>NAME: SM FAISAL AHMED</p>
                        <p>DESIGNATION: SENIOR SUPERVISOR</p>
                    </div>
                    <div style="text-align:center;">
                        <h1 style="font-size:20px; margin:0; font-weight:bold;">DHANMONDI SC</h1>
                        <p style="font-size:9px; letter-spacing:3px; color:#2563eb; font-weight:bold;">DAILY ACTIVITY REPORT</p>
                    </div>
                    <div style="text-align:right; font-size:10px; font-weight:bold;">DATE: ${data.date}</div>
                </div>
                <table style="width:100%; border-collapse:collapse; border:1.5px solid black; font-size:10px; text-align:center; margin-top:10px;">
                    <thead style="background:#f1f5f9;">
                        <tr><th style="border:1px solid black;">SL</th><th style="border:1px solid black;">Client</th><th style="border:1px solid black;">Site Code</th><th style="border:1px solid black;">Work Details</th><th style="border:1px solid black;">OP</th><th style="border:1px solid black;">IM</th><th style="border:1px solid black;">PM</th><th style="border:1px solid black;">OT</th><th style="border:1px solid black;">Remarks</th></tr>
                    </thead>
                    <tbody>${trs}</tbody>
                </table>
                <div style="display:flex; justify-content:space-between; margin-top:10px;">
                    <div class="sig-box">SUBMITTED BY</div>
                    <div class="sig-box">CHECKED BY</div>
                    <div class="sig-box">RECEIVED BY</div>
                </div>
            </div>`;
        }
    </script>
</body>
</html>
