<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMED_V9 | Professional Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background: #f0f2f5; margin: 0; }
        
        /* Landscape Page Setup */
        @page { size: landscape; margin: 5mm; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .report-paper { width: 100% !important; margin: 0 !important; padding: 5mm !important; box-shadow: none !important; border: none !important; }
            th, td { border: 1.2px solid black !important; font-size: 9px !important; padding: 3px !important; }
        }

        .report-paper { 
            width: 290mm; 
            min-height: 195mm; 
            background: white; 
            margin: 15px auto; 
            padding: 10mm; 
            box-shadow: 0 5px 25px rgba(0,0,0,0.15); 
            border: 1px solid #ddd;
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border: 1px solid black; padding: 5px; text-align: center; vertical-align: middle; }
        
        /* Input Styling to prevent overlapping */
        .input-field { width: 100%; border: none; outline: none; background: transparent; text-align: center; font-size: 11px; }
        .header-input { border-bottom: 1px solid black; outline: none; padding: 0 5px; font-weight: bold; }
        .editable-head { font-weight: bold; width: 100%; text-align: center; background: transparent; border: none; font-size: 9px; text-transform: uppercase; color: #1e293b; }
        
        .sig-box { border-top: 1.5px solid black; width: 160px; text-align: center; font-size: 10px; font-weight: bold; margin-top: 40px; color: #334155; }
    </style>
</head>
<body>

    <nav class="bg-slate-900 text-white p-3 sticky top-0 z-50 no-print flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2">
            <i class="fas fa-file-invoice text-blue-400"></i>
            <h1 class="font-bold text-sm tracking-tight uppercase">Ahmed_V9 | Professor System</h1>
        </div>
        <div class="flex gap-3">
            <button onclick="switchTab('entry')" class="bg-blue-600 hover:bg-blue-700 px-4 py-1.5 rounded text-[11px] font-bold transition-all">ENTRY FORM</button>
            <button onclick="switchTab('history')" class="bg-slate-700 hover:bg-slate-600 px-4 py-1.5 rounded text-[11px] font-bold transition-all">REPORT HISTORY</button>
        </div>
    </nav>

    <div id="entrySection">
        <div class="report-paper" id="contentToExport">
            <div class="flex justify-between items-start mb-4">
                <div class="w-1/3 space-y-2">
                    <p class="text-[10px] font-bold">ASSIGNED BY: <input type="text" id="assignedBy" class="header-input w-40" value="MD AZMIR HOSSAIN"></p>
                    <p class="text-[10px] font-bold">NAME: <input type="text" id="userName" class="header-input w-48" value="SM FAISAL AHMED"></p>
                    <p class="text-[10px] font-bold">DESIGNATION: <input type="text" id="userDesig" class="header-input w-40" value="SENIOR SUPERVISOR"></p>
                </div>
                
                <div class="text-center">
                    <h1 class="font-bold text-2xl uppercase text-slate-800 leading-none">Dhanmondi SC</h1>
                    <p class="text-[9px] font-bold uppercase tracking-[0.2em] text-slate-500 mt-2">Daily Activity Report</p>
                </div>
                
                <div class="w-1/3 text-right space-y-2">
                    <p class="text-[10px] font-bold">DATE: <input type="date" id="reportDate" class="border rounded px-2 py-1 text-[10px] font-bold"></p>
                    <div class="flex justify-end gap-4 text-[10px] font-bold">
                        <label class="flex items-center gap-1"><input type="checkbox" id="shiftDay" checked class="w-3 h-3"> DAY</label>
                        <label class="flex items-center gap-1"><input type="checkbox" id="shiftNight" class="w-3 h-3"> NIGHT</label>
                    </div>
                </div>
            </div>

            <table id="mainTable">
                <thead class="bg-slate-100">
                    <tr>
                        <th class="w-[4%]">SL</th>
                        <th class="w-[10%]">Client</th>
                        <th class="w-[12%]">Site Code</th>
                        <th class="w-[32%]">Work Details</th>
                        <th class="w-[7%]"><input type="text" class="editable-head" value="Operation"></th>
                        <th class="w-[7%]"><input type="text" class="editable-head" value="Implementation"></th>
                        <th class="w-[7%]"><input type="text" class="editable-head" value="PM"></th>
                        <th class="w-[7%]"><input type="text" class="editable-head" value="Others"></th>
                        <th class="w-[14%]">Remarks</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>

            <div class="flex justify-between mt-10 px-10">
                <div class="sig-box">SUBMITTED BY</div>
                <div class="sig-box">CHECKED BY</div>
                <div class="sig-box">RECEIVED BY</div>
            </div>
        </div>

        <div class="max-w-4xl mx-auto flex flex-wrap gap-4 justify-center py-10 no-print">
            <button onclick="saveAndPushExcelTelegram()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-3 rounded-xl font-bold text-xs shadow-xl flex items-center gap-2">
                <i class="fab fa-telegram-plane"></i> SYNC EXCEL TO TELEGRAM
            </button>
            <button onclick="downloadExcelLayout()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold text-xs shadow-xl flex items-center gap-2">
                <i class="fas fa-file-excel"></i> DOWNLOAD EXCEL (LAYOUT)
            </button>
            <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-900 text-white px-8 py-3 rounded-xl font-bold text-xs shadow-xl flex items-center gap-2">
                <i class="fas fa-print"></i> PRINT REPORT
            </button>
        </div>
    </div>

    <div id="historySection" class="hidden p-8 max-w-4xl mx-auto">
        <div class="bg-white p-6 rounded-2xl shadow-xl border">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-lg text-slate-800 uppercase tracking-tighter">Report Storage Log</h2>
                <button onclick="downloadAllHistory()" class="bg-slate-900 text-white px-4 py-2 rounded text-[10px] font-bold">DOWNLOAD ALL AS MASTER EXCEL</button>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const botToken = "8582534427:AAHq4TfwFqBIy1wU9mp6bDNQGSeSD49yX94";
        const chatId = "682844989";
        
        // Auto-date
        document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];

        function initRows() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            for(let i=1; i<=15; i++) {
                tbody.innerHTML += `
                    <tr>
                        <td class="h-8 font-bold text-slate-600">${i}</td>
                        <td><input type="text" class="input-field client"></td>
                        <td><input type="text" class="input-field site font-bold text-blue-800"></td>
                        <td><input type="text" class="input-field text-left px-2 work-desc"></td>
                        <td><input type="checkbox" class="cb1 scale-125"></td>
                        <td><input type="checkbox" class="cb2 scale-125"></td>
                        <td><input type="checkbox" class="cb3 scale-125"></td>
                        <td><input type="checkbox" class="cb4 scale-125"></td>
                        <td><input type="text" class="input-field remarks px-2"></td>
                    </tr>
                `;
            }
        }
        initRows();

        function switchTab(tab) {
            document.getElementById('entrySection').classList.toggle('hidden', tab !== 'entry');
            document.getElementById('historySection').classList.toggle('hidden', tab !== 'history');
            if(tab === 'history') renderHistory();
        }

        // --- EXCEL LOGIC: This captures everything as text for Excel ---
        function getExcelReadyTable() {
            const original = document.getElementById('contentToExport');
            const clone = original.cloneNode(true);
            
            // Convert inputs to spans for Excel
            clone.querySelectorAll('input[type="text"]').forEach(input => {
                const span = document.createElement('span');
                span.innerText = input.value;
                input.parentNode.replaceChild(span, input);
            });
            
            // Convert checkboxes to ticks
            clone.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                const span = document.createElement('span');
                span.innerText = cb.checked ? "✔" : "";
                cb.parentNode.replaceChild(span, cb);
            });

            // Handle date input
            const dateVal = document.getElementById('reportDate').value;
            const dateDiv = clone.querySelector('#reportDate');
            if(dateDiv) dateDiv.parentNode.innerText = "DATE: " + dateVal;

            return clone;
        }

        function downloadExcelLayout() {
            const table = getExcelReadyTable();
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, `Daily_Report_${document.getElementById('reportDate').value}.xlsx`);
        }

        async function saveAndPushExcelTelegram() {
            const table = getExcelReadyTable();
            const wb = XLSX.utils.table_to_book(table);
            const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
            const blob = new Blob([wbout], { type: 'application/octet-stream' });
            
            // Save to history first
            saveToLocalHistory();

            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('document', blob, `Report_${document.getElementById('reportDate').value}.xlsx`);
            formData.append('caption', `📊 Daily Activity Report\n📅 Date: ${document.getElementById('reportDate').value}\n👤 SM FAISAL AHMED`);

            try {
                const res = await fetch(`https://api.telegram.org/bot${botToken}/sendDocument`, { method: 'POST', body: formData });
                if(res.ok) alert("✅ Success! Formatted Excel pushed to Telegram.");
                else alert("❌ Telegram Error. Check internet.");
            } catch (e) { alert("Network Error."); }
        }

        function saveToLocalHistory() {
            const date = document.getElementById('reportDate').value;
            const rows = document.querySelectorAll('#tableBody tr');
            const entries = [];
            rows.forEach(r => {
                const site = r.querySelector('.site').value;
                if(site) entries.push({ site, desc: r.querySelector('.work-desc').value });
            });
            
            let history = JSON.parse(localStorage.getItem('prof_v9_logs')) || [];
            history.push({ id: Date.now(), date, sites: entries.length });
            localStorage.setItem('prof_v9_logs', JSON.stringify(history));
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            let history = JSON.parse(localStorage.getItem('prof_v9_logs')) || [];
            list.innerHTML = history.reverse().map(h => `
                <div class="flex justify-between items-center p-4 bg-slate-50 border border-slate-200 rounded-xl">
                    <span class="font-bold text-slate-700">📅 ${h.date} | ${h.sites} Sites Worked</span>
                    <span class="text-[9px] bg-blue-100 text-blue-600 px-3 py-1 rounded-full font-bold uppercase">Stored</span>
                </div>
            `).join('') || '<p class="text-center text-slate-400 py-10">No history found.</p>';
        }

        function downloadAllHistory() {
            let history = JSON.parse(localStorage.getItem('prof_v9_logs')) || [];
            if(history.length === 0) return alert("Nothing to download.");
            const ws = XLSX.utils.json_to_sheet(history);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "MasterLog");
            XLSX.writeFile(wb, "Master_Report_History.xlsx");
        }
    </script>
</body>
</html>
